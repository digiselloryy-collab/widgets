<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: transparent !important;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Times New Roman', Times, serif;
  }

  .widget-button {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 94%; 
    max-width: 450px;
    height: 160px;
    /* Professional Medical Emerald */
    background: linear-gradient(135deg, #134e4a 0%, #06201e 100%);
    border: 2px solid #bfa07a; 
    border-radius: 15px;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 8px 15px rgba(0,0,0,0.4);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .label {
    color: #f7e6c4; 
    font-size: 2.8rem;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .subtext {
    color: #bfa07a; 
    font-size: 0.8rem;
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 600;
  }
</style>
</head>
<body>

  <a href="notion://www.notion.so/a758e1e6cb8b498a9d52503d9b440b3a?v=8d006429a94944628090f91be078565e" 
     class="widget-button">
    <span class="label">Today</span>
    <span class="subtext">Daily Rounds</span>
  </a>

</body>
