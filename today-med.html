<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: transparent !important;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Times New Roman', Times, serif;
  }

  .widget-button {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 92%; 
    max-width: 450px;
    height: 180px;
    /* Deep Emerald / Surgeon Green */
    background: linear-gradient(145deg, #1a3a3a, #0d2121);
    border: 2px solid #bfa07a; /* Antique Gold */
    border-radius: 16px;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  }

  .widget-button:hover {
    transform: scale(1.02);
    border-color: #f7e6c4;
    box-shadow: 0 15px 30px rgba(0,0,0,0.6);
  }

  .label {
    color: #f7e6c4; /* Cream Ivory */
    font-size: 3.2rem;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }

  .subtext {
    color: #bfa07a; /* Gold */
    font-size: 0.85rem;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 600;
  }
</style>
</head>
<body>

  <div class="widget-button" onclick="openNotion()">
    <span class="label">Today</span>
    <span class="subtext">Daily Rounds</span>
  </div>

  <script>
    function openNotion() {
      const url = "https://www.notion.so/a758e1e6cb8b498a9d52503d9b440b3a?v=8d006429a94944628090f91be078565e&source=copy_link";
      
      // This works on both PC and Android
      // It forces a new tab which bypasses PC security blocks
      window.open(url, '_blank');
    }
  </script>

</body>
</html>
